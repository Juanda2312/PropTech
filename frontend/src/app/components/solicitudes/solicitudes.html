<div class="admin-layout">
  <app-sidebar></app-sidebar>
  <div class="admin-main">
    <div class="topbar">
      <div class="topbar-title">Solicitudes de atención</div>
      <div class="topbar-sub">Cola de solicitudes pendientes por procesar</div>
      <button class="btn-nuevo" (click)="mostrarForm = true">+ Nueva solicitud</button>
    </div>

    <div class="contenido">
      <div class="filtros-bar">
        <input type="text" [(ngModel)]="busqueda" placeholder="Buscar por cliente..." (input)="filtrar()"/>
        <select [(ngModel)]="filtroEstado" (change)="filtrar()">
          <option value="">Todos los estados</option>
          <option>pendiente</option>
          <option>en atención</option>
          <option>resuelta</option>
          <option>cancelada</option>
        </select>
        <select [(ngModel)]="filtroPrioridad" (change)="filtrar()">
          <option value="">Todas las prioridades</option>
          <option>alta</option>
          <option>media</option>
          <option>baja</option>
        </select>
      </div>

      <div class="tabla-wrapper">
        <table class="tabla">
          <thead>
            <tr>
              <th>ID</th>
              <th>Cliente</th>
              <th>Tipo</th>
              <th>Descripción</th>
              <th>Fecha</th>
              <th>Prioridad</th>
              <th>Estado</th>
              <th>Asesor</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let s of solicitudesFiltradas">
              <td>{{s.id}}</td>
              <td>{{s.cliente}}</td>
              <td>{{s.tipo}}</td>
              <td>{{s.descripcion}}</td>
              <td>{{s.fecha}}</td>
              <td><span class="prioridad-badge" [class]="s.prioridad">{{s.prioridad}}</span></td>
              <td><span class="estado-badge" [class]="s.estado.replace(' ','-')">{{s.estado}}</span></td>
              <td>{{s.asesor}}</td>
              <td>
                <button class="btn-atender" (click)="atender(s)">Atender</button>
                <button class="btn-del" (click)="eliminar(s)">Eliminar</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="modal-overlay" *ngIf="mostrarForm" (click)="cerrarForm()">
        <div class="modal" (click)="$event.stopPropagation()">
          <h3>Nueva solicitud</h3>
          <div class="form-grid">
            <div class="form-grupo">
              <label>Cliente</label>
              <input [(ngModel)]="form.cliente" placeholder="Nombre del cliente"/>
            </div>
            <div class="form-grupo">
              <label>Tipo de solicitud</label>
              <select [(ngModel)]="form.tipo">
                <option>información de inmueble</option>
                <option>agendar visita</option>
                <option>negociación</option>
                <option>queja o reclamo</option>
                <option>otro</option>
              </select>
            </div>
            <div class="form-grupo" style="grid-column: span 2">
              <label>Descripción</label>
              <textarea [(ngModel)]="form.descripcion" placeholder="Descripción detallada..."></textarea>
            </div>
            <div class="form-grupo">
              <label>Prioridad</label>
              <select [(ngModel)]="form.prioridad">
                <option>alta</option>
                <option>media</option>
                <option>baja</option>
              </select>
            </div>
            <div class="form-grupo">
              <label>Asesor asignado</label>
              <input [(ngModel)]="form.asesor" placeholder="Nombre del asesor"/>
            </div>
          </div>
          <div class="modal-acciones">
            <button class="btn-guardar" (click)="guardar()">Guardar</button>
            <button class="btn-cancelar" (click)="cerrarForm()">Cancelar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
