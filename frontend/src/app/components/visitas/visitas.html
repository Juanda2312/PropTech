<div class="admin-layout">
  <app-sidebar></app-sidebar>
  <div class="admin-main">
    <div class="topbar">
      <div class="topbar-title">Programación de visitas</div>
      <div class="topbar-sub">Administre las visitas a inmuebles</div>
      <button class="btn-nuevo" (click)="mostrarForm = true">+ Nueva visita</button>
    </div>

    <div class="contenido">
      <div class="filtros-bar">
        <input type="text" [(ngModel)]="busqueda" placeholder="Buscar por cliente o inmueble..." (input)="filtrar()"/>
        <select [(ngModel)]="filtroEstado" (change)="filtrar()">
          <option value="">Todos los estados</option>
          <option>pendiente</option>
          <option>confirmada</option>
          <option>realizada</option>
          <option>cancelada</option>
          <option>reprogramada</option>
        </select>
      </div>

      <div class="tabla-wrapper">
        <table class="tabla">
          <thead>
            <tr>
              <th>ID</th>
              <th>Cliente</th>
              <th>Inmueble</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Asesor</th>
              <th>Estado</th>
              <th>Observaciones</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let v of visitasFiltradas">
              <td>{{v.id}}</td>
              <td>{{v.cliente}}</td>
              <td>{{v.inmueble}}</td>
              <td>{{v.fecha}}</td>
              <td>{{v.hora}}</td>
              <td>{{v.asesor}}</td>
              <td><span class="estado-badge" [class]="v.estado">{{v.estado}}</span></td>
              <td>{{v.observaciones}}</td>
              <td>
                <button class="btn-edit" (click)="editar(v)">Editar</button>
                <button class="btn-del" (click)="cancelar(v)">Cancelar</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="modal-overlay" *ngIf="mostrarForm" (click)="cerrarForm()">
        <div class="modal" (click)="$event.stopPropagation()">
          <h3>{{modoEdicion ? 'Editar visita' : 'Nueva visita'}}</h3>
          <div class="form-grid">
            <div class="form-grupo">
              <label>Cliente</label>
              <input [(ngModel)]="form.cliente" placeholder="Nombre del cliente"/>
            </div>
            <div class="form-grupo">
              <label>Inmueble</label>
              <input [(ngModel)]="form.inmueble" placeholder="Código o nombre del inmueble"/>
            </div>
            <div class="form-grupo">
              <label>Fecha</label>
              <input type="date" [(ngModel)]="form.fecha"/>
            </div>
            <div class="form-grupo">
              <label>Hora</label>
              <input type="time" [(ngModel)]="form.hora"/>
            </div>
            <div class="form-grupo">
              <label>Asesor asignado</label>
              <input [(ngModel)]="form.asesor" placeholder="Nombre del asesor"/>
            </div>
            <div class="form-grupo">
              <label>Estado</label>
              <select [(ngModel)]="form.estado">
                <option>pendiente</option>
                <option>confirmada</option>
                <option>realizada</option>
                <option>cancelada</option>
                <option>reprogramada</option>
              </select>
            </div>
            <div class="form-grupo" style="grid-column: span 2">
              <label>Observaciones</label>
              <textarea [(ngModel)]="form.observaciones" placeholder="Notas adicionales..."></textarea>
            </div>
          </div>
          <div class="modal-acciones">
            <button class="btn-guardar" (click)="guardar()">Guardar</button>
            <button class="btn-cancelar" (click)="cerrarForm()">Cancelar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
