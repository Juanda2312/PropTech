<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">
      <svg width="32" height="32" viewBox="0 0 52 52">
        <rect width="52" height="52" rx="12" fill="#D4AF37"/>
        <polygon points="26,10 44,26 38,26 38,42 14,42 14,26 8,26" fill="#0B1929"/>
        <rect x="21" y="30" width="10" height="12" rx="2" fill="#D4AF37"/>
      </svg>
    </div>
    <div>
      <h2>Be<span class="gold">Ta</span></h2>
      <p>Inmobiliaria</p>
    </div>
  </div>

  <nav>
    <div class="nav-section">
      <span class="nav-label">Principal</span>
      <a routerLink="/admin/dashboard" routerLinkActive="active">
        <span class="icon">▦</span> Dashboard
      </a>
      <a routerLink="/admin/inmuebles" routerLinkActive="active">
        <span class="icon">⌂</span> Inmuebles
      </a>
      <a routerLink="/admin/clientes" routerLinkActive="active">
        <span class="icon">◉</span> Clientes
      </a>
      <a routerLink="/admin/asesores" routerLinkActive="active">
        <span class="icon">◈</span> Asesores
      </a>
    </div>

    <div class="nav-section">
      <span class="nav-label">Gestión</span>
      <a routerLink="/admin/visitas" routerLinkActive="active">
        <span class="icon">◆</span> Visitas
      </a>
      <a routerLink="/admin/contratos" routerLinkActive="active">
        <span class="icon">◇</span> Contratos
      </a>
      <a routerLink="/admin/solicitudes" routerLinkActive="active">
        <span class="icon">◻</span> Solicitudes
      </a>
      <a routerLink="/admin/operaciones" routerLinkActive="active">
        <span class="icon">⬡</span> Operaciones
      </a>
      <a routerLink="/admin/alertas" routerLinkActive="active">
        <span class="icon">⚠</span> Alertas
        <span class="badge">3</span>
      </a>
      <a routerLink="/admin/comportamiento" routerLinkActive="active">
        <span class="icon">◎</span> Comportamiento
      </a>
    </div>

    <div class="nav-section">
      <span class="nav-label">Sitio público</span>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
        <span class="icon">🏠</span> Inicio
      </a>
      <a routerLink="/catalogo" routerLinkActive="active">
        <span class="icon">🔍</span> Catálogo
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="footer-text">Tapiero & Bedoya</div>
    <div class="footer-sub">© 2026 BeTa Inmobiliaria</div>
  </div>
</div>
