<div class="admin-layout">
  <app-sidebar></app-sidebar>
  <div class="admin-main">
    <div class="topbar">
      <div class="topbar-title">Alertas automáticas</div>
      <div class="topbar-sub">Monitoreo de eventos críticos del sistema</div>
    </div>

    <div class="contenido">
      <div class="metrics">
        <div class="metric alto">
          <div class="metric-label">Nivel alto</div>
          <div class="metric-value">{{contarNivel('alto')}}</div>
        </div>
        <div class="metric medio">
          <div class="metric-label">Nivel medio</div>
          <div class="metric-value">{{contarNivel('medio')}}</div>
        </div>
        <div class="metric bajo">
          <div class="metric-label">Nivel bajo</div>
          <div class="metric-value">{{contarNivel('bajo')}}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Total alertas</div>
          <div class="metric-value">{{alertas.length}}</div>
        </div>
      </div>

      <div class="filtros-bar">
        <select [(ngModel)]="filtroNivel" (change)="filtrar()">
          <option value="">Todos los niveles</option>
          <option>alto</option>
          <option>medio</option>
          <option>bajo</option>
        </select>
        <select [(ngModel)]="filtroTipo" (change)="filtrar()">
          <option value="">Todos los tipos</option>
          <option>contrato</option>
          <option>inmueble</option>
          <option>visita</option>
          <option>cliente</option>
        </select>
        <select [(ngModel)]="filtroEstado" (change)="filtrar()">
          <option value="">Todos</option>
          <option>pendiente</option>
          <option>atendida</option>
        </select>
      </div>

      <div class="alertas-lista">
        <div class="alerta-item" *ngFor="let a of alertasFiltradas" [class]="a.nivel">
          <div class="al-nivel-bar"></div>
          <div class="al-icono">⚠</div>
          <div class="al-contenido">
            <div class="al-titulo">{{a.titulo}}</div>
            <div class="al-desc">{{a.descripcion}}</div>
            <div class="al-meta">
              <span class="al-tipo">{{a.tipo}}</span>
              <span class="al-fecha">{{a.fecha}}</span>
            </div>
          </div>
          <div class="al-acciones">
            <span class="nivel-badge" [class]="a.nivel">{{a.nivel}}</span>
            <button class="btn-atender" (click)="atender(a)" [disabled]="a.estado === 'atendida'">
              {{a.estado === 'atendida' ? 'Atendida' : 'Atender'}}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
